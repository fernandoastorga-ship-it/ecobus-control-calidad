{% extends 'base.html' %}{% block content %}<div class="landing"><img class="logo" src="/static/logo_ecobus.png"><div class="vehicle"><div class="small">Estás evaluando</div><strong>{{bus.internal_number}} - {{bus.plate}}</strong><br><span class="pill">QR {{qr_type|capitalize}}</span></div><div class="card"><h2 style="text-align:center;margin-top:0">Evalúa esta conducción</h2><form method="post" action="/qr/{{bus.id}}/{{qr_type}}/review" enctype="multipart/form-data"><div class="stars"><input type="radio" id="s5" name="rating" value="5" required><label for="s5">★</label><input type="radio" id="s4" name="rating" value="4"><label for="s4">★</label><input type="radio" id="s3" name="rating" value="3"><label for="s3">★</label><input type="radio" id="s2" name="rating" value="2"><label for="s2">★</label><input type="radio" id="s1" name="rating" value="1"><label for="s1">★</label></div><label>Tipo de observación</label><select name="observation_type"><option>Felicitación</option><option selected>Sugerencia</option><option>Reclamo</option></select><label>Comentario</label><textarea name="comment" rows="4" placeholder="Cuéntanos qué ocurrió o cómo fue tu experiencia"></textarea><label>Adjuntar fotografía opcional</label><input type="file" name="photo" accept="image/*"><label>Nombre opcional</label><input name="passenger_name" placeholder="Puedes dejarlo vacío"><label style="display:flex;gap:8px;align-items:center;font-weight:500"><input style="width:auto" type="checkbox" name="anonymous" value="1"> Enviar de forma anónima</label><br><button class="btn full">Enviar evaluación</button></form></div><div class="card"><h3 style="margin-top:0;text-align:center">Otros servicios Ecobus</h3><div class="commercial"><a class="btn wa" href="/go/{{bus.id}}/{{qr_type}}/whatsapp"><span class="icon">🟢</span> Cotizar por WhatsApp</a><a class="btn secondary" href="/go/{{bus.id}}/{{qr_type}}/instagram"><span class="icon">📸</span> Instagram</a><a class="btn secondary" href="/go/{{bus.id}}/{{qr_type}}/web"><span class="icon">🌐</span> Sitio Web</a></div></div></div>{% endblock %}
