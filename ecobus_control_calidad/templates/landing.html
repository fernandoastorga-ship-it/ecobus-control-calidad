{% extends 'base.html' %}{% block content %}<main class="public"><div class="public-card"><img src="/static/logo_ecobus.png" class="logo"><div class="bus-pill"><b>{{bus.code}}</b><span>{{bus.patente}}</span></div><p class="muted">{{title}}</p><form method="post" action="/q/{{bus.code}}/{{qr_type}}/evaluate" enctype="multipart/form-data" class="eval-form"><h1>Evalúa la conducción</h1><div class="stars"><input type="radio" id="s5" name="rating" value="5" required><label for="s5">★</label><input type="radio" id="s4" name="rating" value="4"><label for="s4">★</label><input type="radio" id="s3" name="rating" value="3"><label for="s3">★</label><input type="radio" id="s2" name="rating" value="2"><label for="s2">★</label><input type="radio" id="s1" name="rating" value="1"><label for="s1">★</label></div><select name="observation_type"><option>Comentario</option><option>Felicitación</option><option>Sugerencia</option><option>Reclamo</option></select><textarea name="comment" rows="4" placeholder="Cuéntanos qué ocurrió o por qué entregas esta evaluación"></textarea><input name="passenger_name" placeholder="Tu nombre (opcional)"><label class="check"><input type="checkbox" name="anonymous" checked> Enviar como anónimo</label><label class="file">📷 Adjuntar fotos opcionales<input type="file" name="photos" accept="image/*" multiple></label><small class="muted">Puedes adjuntar hasta 3 fotos. Máximo 10 MB por foto.</small><button class="primary">Enviar evaluación</button></form><div class="commercial"><h2>Otros servicios Ecobus</h2><a class="btn whatsapp" href="/go/{{bus.code}}/{{qr_type}}/whatsapp"><span>☘</span>Cotizar por WhatsApp</a><a class="btn white" href="/go/{{bus.code}}/{{qr_type}}/instagram"><span>◎</span>Instagram</a><a class="btn white" href="/go/{{bus.code}}/{{qr_type}}/website"><span>🌐</span>Sitio Web</a></div></div></main>{% endblock %}
